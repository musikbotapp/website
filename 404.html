<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Not Found | MusikBot</title>

    <link rel="icon" type="image/png" href="./images/musikbot.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d0d0f;
        --surface: #141418;
        --surface2: #1a1a20;
        --border: rgba(255, 255, 255, 0.06);
        --green: #23d05e;
        --green-glow: rgba(35, 208, 94, 0.25);
        --text: #f0f0f2;
        --text-muted: #6b6b78;
        --text-mid: #9b9baa;
        --nav-height: 72px;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        height: var(--nav-height);
        display: flex;
        justify-content: space-between;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 0 clamp(24px, 5vw, 64px);
        background: rgba(13, 13, 15, 0.8);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-bottom: 1px solid var(--border);
      }

      .nav-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: var(--text);
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 17px;
        letter-spacing: -0.02em;
        justify-self: start;
      }

      .nav-logo img {
        width: 28px;
        height: 28px;
      }

      .nav-home {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 14px;
        transition: color 0.2s;
      }

      .nav-home:hover {
        color: var(--text);
      }

      .wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px;
        position: relative;
        overflow: hidden;
      }

      .glow {
        position: absolute;
        width: 700px;
        height: 700px;
        background: radial-gradient(
          circle,
          rgba(35, 208, 94, 0.07),
          transparent 65%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .content {
        position: relative;
        max-width: 520px;
      }

      .code {
        font-family: "Syne", sans-serif;
        font-size: 120px;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--green);
        line-height: 1;
        margin-bottom: 20px;
      }

      h1 {
        font-family: "Syne", sans-serif;
        font-size: 38px;
        font-weight: 700;
        margin-bottom: 14px;
        letter-spacing: -0.02em;
      }

      p {
        color: var(--text-mid);
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 36px;
      }

      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn-primary {
        background: var(--green);
        color: #000;
        padding: 12px 22px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px var(--green-glow);
      }

      .btn-secondary {
        border: 1px solid var(--border);
        color: var(--text-mid);
        padding: 12px 18px;
        border-radius: 10px;
        text-decoration: none;
        transition: all 0.2s;
      }

      .btn-secondary:hover {
        color: var(--text);
        background: var(--surface);
      }

      footer {
        border-top: 1px solid var(--border);
        padding: 32px clamp(24px, 5vw, 64px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      .footer-logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 15px;
        color: var(--text);
        text-decoration: none;
      }

      .footer-logo img {
        width: 24px;
        height: 24px;
      }

      .footer-links {
        display: flex;
        gap: 24px;
        list-style: none;
      }

      .footer-links a {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 14px;
        transition: color 0.2s;
      }

      .footer-links a:hover {
        color: var(--text);
      }

      .footer-copy {
        font-size: 13px;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/" class="nav-logo">
        <img src="./images/musikbot.png" alt="MusikBot" />
        MusikBot
      </a>

      <a href="/" class="nav-home">Back to home</a>
    </nav>

    <main class="wrapper">
      <div class="glow"></div>

      <div class="content">
        <div class="code">404</div>
        <h1>This page doesn’t exist.</h1>
        <p>Either it was moved, deleted, or you just hit a dead link.</p>

        <div class="actions">
          <a href="/" class="btn-primary">Go home</a>
          <a href="https://discord.gg/uhempDmQkn" class="btn-secondary"
            >Support server</a
          >
        </div>
      </div>
    </main>

    <footer>
      <a href="/" class="footer-logo">
        <img src="./images/musikbot.png" alt="MusikBot" />
        MusikBot
      </a>
      <ul class="footer-links">
        <li>
          <a
            href="https://discord.com/oauth2/authorize?client_id=848101659665891329&scope=bot&permissions=414468009280"
            >Invite</a
          >
        </li>
        <li><a href="https://discord.gg/jgJybrnB6D">Support Server</a></li>
        <li><a href="/terms-of-service">Terms</a></li>
        <li><a href="/privacy-policy">Privacy</a></li>
      </ul>
      <span class="footer-copy">© 2026 MusikBot</span>
    </footer>
  </body>
</html>
